server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/blogdb
    username: blog_user
    password: blog_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

